<!DOCTYPE html>
<html>
<head>
  <title>Pomodoro Chopper</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
 
<body>
 
  <div id="leaves-container"></div>
 
  <div id="pillar">
    <img src="pillar.png">
  </div>
 
  <div id="choppertop">
    <img src="chopper1.png" id="chopperIdle">
  </div>

  <div id="inputs">
    <label for="work-duration">Focus:</label>
    <input type="number" id="work-duration" value="25" min="1">
    <label for="break-duration">Break:</label>
    <input type="number" id="break-duration" value="5" min="1">
  </div>
 
  <div id="message">
    <h2>Time to Focus!</h2>
  </div>
 
  <div id="timer">
    <div id="time">25:00</div>
  </div>
 
  <div id="controls">
    <button id="start">Start</button>
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
  </div>
 
  <div id="progress">
    <img src="hat.png">
    <img src="hat.png">
    <img src="hat.png">
    <img src="hat.png">
  </div>
 
  <div id="chopperBottom">
    <img src="wave.png">
  </div>
  
  <div id="navbar">
  <div id="brand">Choppodoro <3 </div>
  <div id="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </div>
</div>
<script src="index.js"></script>
</body>
<div id="mobile-message">
  Choppodoro is best experienced on desktop! 🍂
</div>
</html>
